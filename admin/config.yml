  # ──────────────────────────────────────────
  # Products (per language)
  # ──────────────────────────────────────────
  - name: "products_en"
    label: "🏭 Products (English)"
    folder: "content/en/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: "title", label: "Product Title", widget: "string" }
      - { name: "slug", label: "URL Slug", widget: "string" }
      - { name: "category", label: "Category Slug", widget: "string" }
      - { name: "description", label: "Short Description", widget: "text" }
      - { name: "image", label: "Product Image", widget: "image" }
      - { name: "body", label: "Full Description", widget: "markdown" }
      - { name: "featured", label: "Featured on Home Page", widget: "boolean", default: false }
      - { name: "order", label: "Display Order", widget: "number", default: 0 }

  - name: "products_ar"
    label: "🏭 المنتجات (Arabic)"
