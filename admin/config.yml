backend:
  name: github
  repo: MaherMaker-EmotionHack/mettaroll-content
  branch: main
  base_url: https://mettaroll-decap-oauth.maher-serawan-1998.workers.dev
  auth_endpoint: /auth
  site_domain: mahermaker.me

local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

slug:
  encoding: "ascii"
  clean_accents: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# I18N Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
i18n:
  structure: multiple_folders
  locales: [en, ar, de, nl]
  default_locale: en

collections:
  # ──────────────────────────────────────────
  # Pages (file-based — one file per page per language)
  # ──────────────────────────────────────────
  - name: "pages_en"
    label: "📄 Pages (English)"
    files:
      - name: "home_en"
        label: "Home Page"
        file: "content/en/pages/home.md"
        fields:
          - { name: "title", label: "Page Title", widget: "string" }
          - { name: "hero_headline", label: "Hero Headline", widget: "string" }
          - { name: "hero_image", label: "Hero Background Image", widget: "image" }
          - name: "overview"
            label: "Company Overview"
            widget: "object"
            fields:
              - { name: "heading", label: "Heading", widget: "string" }
              - { name: "body", label: "Body Text", widget: "markdown" }
              - { name: "image", label: "Image", widget: "image" }
          - name: "services"
            label: "Services Section"
            widget: "list"
            max: 3
            fields:
              - { name: "title", label: "Service Title", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
              - { name: "icon", label: "Icon", widget: "string", required: false }
          - name: "seo"
            label: "SEO"
            widget: "object"
            collapsed: true
            fields:
              - { name: "meta_title", label: "Meta Title", widget: "string", required: false }
              - { name: "meta_description", label: "Meta Description", widget: "text", required: false }

      - name: "products_page_en"
        label: "Products Page"
        file: "content/en/pages/products.md"
        fields:
          - { name: "title", label: "Page Title", widget: "string" }
          - { name: "hero_headline", label: "Hero Headline", widget: "string" }
          - { name: "hero_image", label: "Hero Background Image", widget: "image" }
          - name: "cta"
            label: "Quote CTA Section"
            widget: "object"
            fields:
              - { name: "heading", label: "Heading", widget: "string" }
              - { name: "body", label: "Body Text", widget: "text" }
              - { name: "link_text", label: "Link Text", widget: "string" }
          - name: "seo"
            label: "SEO"
            widget: "object"
            collapsed: true
            fields:
              - { name: "meta_title", label: "Meta Title", widget: "string", required: false }
              - { name: "meta_description", label: "Meta Description", widget: "text", required: false }

      - name: "contact_en"
        label: "Contact Page"
        file: "content/en/pages/contact.md"
        fields:
          - { name: "title", label: "Page Title", widget: "string" }
          - { name: "hero_headline", label: "Hero Headline", widget: "string" }
          - { name: "hero_image", label: "Hero Background Image", widget: "image" }
          - { name: "team_heading", label: "Team Section Heading", widget: "string" }
          - name: "office"
            label: "Office Section"
            widget: "object"
            fields:
              - { name: "heading", label: "Heading", widget: "string" }
              - { name: "address", label: "Address", widget: "text" }
              - { name: "map_embed_url", label: "Google Maps Embed URL", widget: "string", required: false }
          - name: "seo"
            label: "SEO"
            widget: "object"
            collapsed: true
            fields:
              - { name: "meta_title", label: "Meta Title", widget: "string", required: false }
              - { name: "meta_description", label: "Meta Description", widget: "text", required: false }

      - name: "about_en"
        label: "About Page"
        file: "content/en/pages/about.md"
        fields:
          - { name: "title", label: "Page Title", widget: "string" }
          - { name: "hero_headline", label: "Hero Headline", widget: "string" }
          - { name: "hero_image", label: "Hero Background Image", widget: "image" }
          - name: "vision"
            label: "Vision Section"
            widget: "object"
            fields:
              - { name: "heading", label: "Heading", widget: "string" }
              - { name: "body", label: "Body Text", widget: "text" }
          - name: "story"
            label: "Our Story Section"
            widget: "object"
            fields:
              - { name: "heading", label: "Heading", widget: "string" }
              - { name: "body", label: "Body Text", widget: "markdown" }
              - { name: "image", label: "Image", widget: "image" }
          - name: "values"
            label: "Values Section"
            widget: "object"
            fields:
              - { name: "heading", label: "Heading", widget: "string" }
              - name: "items"
                label: "Value Items"
                widget: "list"
                fields:
                  - { name: "title", label: "Title", widget: "string" }
                  - { name: "description", label: "Description", widget: "text" }
                  - { name: "icon", label: "Icon Name", widget: "string", required: false }
          - name: "stats"
            label: "Stats"
            widget: "list"
            fields:
              - { name: "value", label: "Value (e.g. 50+)", widget: "string" }
              - { name: "label", label: "Label (e.g. Years in Business)", widget: "string" }
          - name: "seo"
            label: "SEO"
            widget: "object"
            collapsed: true
            fields:
              - { name: "meta_title", label: "Meta Title", widget: "string", required: false }
              - { name: "meta_description", label: "Meta Description", widget: "text", required: false }

